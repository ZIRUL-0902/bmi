<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健康雷達 HealthRadar – BMI 計算器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      color: #e0f4ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #43e97b, #38f9d7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #93c5d0;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: #a8d8ea;
      margin-bottom: 0.45rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
    }

    input[type="number"]:focus {
      border-color: #38f9d7;
      background: rgba(56, 249, 215, 0.1);
    }

    input[type="number"]::placeholder { color: rgba(255,255,255,0.35); }

    button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 0.9rem;
      background: linear-gradient(90deg, #43e97b, #38f9d7);
      color: #0f2027;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }

    button:hover  { opacity: 0.9; transform: translateY(-1px); }
    button:active { opacity: 0.95; transform: translateY(0); }

    .result {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 1rem;
      text-align: center;
      display: none;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .result.show { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bmi-value {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .bmi-category {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    .bmi-advice {
      font-size: 0.88rem;
      color: #93c5d0;
      line-height: 1.6;
    }

    .range-table {
      margin-top: 2rem;
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .range-table th,
    .range-table td {
      padding: 0.55rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: left;
    }

    .range-table th {
      color: #38f9d7;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    .error {
      color: #ff6b6b;
      font-size: 0.82rem;
      margin-top: 0.3rem;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>

<header>
  <h1>🩺 健康雷達 HealthRadar</h1>
  <p>你的專屬身體數據分析引擎</p>
</header>

<div class="card">
  <div class="form-group">
    <label for="height">身高 Height (cm)</label>
    <input type="number" id="height" placeholder="例如 170" min="50" max="300" />
    <span class="error" id="heightError">請輸入有效的身高 (50–300 cm)</span>
  </div>
  <div class="form-group">
    <label for="weight">體重 Weight (kg)</label>
    <input type="number" id="weight" placeholder="例如 65" min="1" max="500" />
    <span class="error" id="weightError">請輸入有效的體重 (1–500 kg)</span>
  </div>
  <button onclick="calculate()">計算 BMI</button>

  <div class="result" id="result">
    <div class="bmi-value" id="bmiValue">--</div>
    <div class="bmi-category" id="bmiCategory"></div>
    <div class="bmi-advice" id="bmiAdvice"></div>
  </div>

  <table class="range-table" aria-label="BMI 分類表">
    <thead>
      <tr><th>範圍</th><th>BMI</th><th>分類</th></tr>
    </thead>
    <tbody>
      <tr><td><span class="dot" style="background:#60a5fa"></span>偏輕</td><td>&lt; 18.5</td><td>Underweight</td></tr>
      <tr><td><span class="dot" style="background:#34d399"></span>正常</td><td>18.5 – 24.9</td><td>Normal</td></tr>
      <tr><td><span class="dot" style="background:#fbbf24"></span>過重</td><td>25.0 – 29.9</td><td>Overweight</td></tr>
      <tr><td><span class="dot" style="background:#f87171"></span>肥胖</td><td>≥ 30.0</td><td>Obese</td></tr>
    </tbody>
  </table>
</div>

<footer>數據僅供參考，不構成醫療建議 · Data for reference only, not medical advice</footer>

<script>
  const categories = [
    { max: 18.5, label: '偏輕 Underweight', color: '#60a5fa',
      advice: '您的體重略低於標準範圍，建議均衡飲食，適當增加熱量與蛋白質攝取，並諮詢醫師或營養師。' },
    { max: 25.0, label: '正常 Normal weight', color: '#34d399',
      advice: '體重在健康範圍內，繼續保持均衡飲食與規律運動習慣，維持良好生活品質！' },
    { max: 30.0, label: '過重 Overweight', color: '#fbbf24',
      advice: '體重略高於健康範圍，建議調整飲食結構、減少精緻糖與高脂食物，並增加有氧運動頻率。' },
    { max: Infinity, label: '肥胖 Obese', color: '#f87171',
      advice: '體重超出健康範圍，建議尋求專業醫療評估，制定個人化的減重計畫，以降低相關健康風險。' },
  ];

  function calculate() {
    const heightInput = document.getElementById('height');
    const weightInput = document.getElementById('weight');
    const heightErr = document.getElementById('heightError');
    const weightErr = document.getElementById('weightError');
    const result    = document.getElementById('result');

    const h = parseFloat(heightInput.value);
    const w = parseFloat(weightInput.value);

    let valid = true;

    if (!heightInput.value || isNaN(h) || h < 50 || h > 300) {
      heightErr.classList.add('show');
      valid = false;
    } else {
      heightErr.classList.remove('show');
    }

    if (!weightInput.value || isNaN(w) || w < 1 || w > 500) {
      weightErr.classList.add('show');
      valid = false;
    } else {
      weightErr.classList.remove('show');
    }

    if (!valid) { result.classList.remove('show'); return; }

    const bmi = w / ((h / 100) ** 2);
    const cat = categories.find(c => bmi < c.max);

    document.getElementById('bmiValue').textContent    = bmi.toFixed(1);
    document.getElementById('bmiValue').style.color    = cat.color;
    document.getElementById('bmiCategory').textContent = cat.label;
    document.getElementById('bmiCategory').style.color = cat.color;
    document.getElementById('bmiAdvice').textContent   = cat.advice;

    result.classList.add('show');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
